name: Build Windows

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      # The windows/ platform directory is committed to the repository,
      # so there is no need to run `flutter create --platforms=windows`.

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: lumiluna-windows
          # Upload the build output directory directly. GitHub's
          # upload-artifact action wraps it in a ZIP automatically, so we
          # should NOT pre-zip it — that would create a double-nested ZIP.
          path: build/windows/x64/runner/Release/*
          retention-days: 30
