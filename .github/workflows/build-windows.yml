name: Build Windows

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      # Generate the Windows platform boilerplate (windows/ folder) in CI,
      # so the repository only stores source code.
      - name: Generate Windows platform files
        run: flutter create --platforms=windows --project-name lumiluna .

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Package artifact
        shell: pwsh
        run: |
          $src = "build/windows/x64/runner/Release"
          if (-not (Test-Path $src)) { $src = "build/windows/runner/Release" }
          Compress-Archive -Path "$src/*" -DestinationPath "lumiluna-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumiluna-windows
          path: lumiluna-windows.zip
          retention-days: 30
