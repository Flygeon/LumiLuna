name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Windows (desktop)
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      # The windows/ platform directory is committed to the repository,
      # so there is no need to run `flutter create --platforms=windows`.

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: lumiluna-windows
          path: build/windows/x64/runner/Release/*
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Android (mobile)
  # ---------------------------------------------------------------------------
  build-android:
    name: Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      # Android platform files were added via `flutter create --platforms=android`
      # and are committed to the repository.

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build Android APK (release)
        run: flutter build apk --release --split-per-abi --android-skip-build-dependency-validation

      - name: Upload APK (arm64-v8a)
        uses: actions/upload-artifact@v5
        with:
          name: lumiluna-android-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload APK (armeabi-v7a)
        uses: actions/upload-artifact@v5
        with:
          name: lumiluna-android-arm32
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Upload APK (x86_64)
        uses: actions/upload-artifact@v5
        with:
          name: lumiluna-android-x86_64
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Release (only on push to master/main or manual dispatch)
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    needs: [build-windows, build-android]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Read app version
        id: version
        run: |
          echo "version=$(grep '^version: ' pubspec.yaml | sed 's/version: //')" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: lumiluna-windows
          path: release/windows

      - name: Download Android APK (arm64-v8a)
        uses: actions/download-artifact@v4
        with:
          name: lumiluna-android-arm64
          path: release/android

      - name: Download Android APK (armeabi-v7a)
        uses: actions/download-artifact@v4
        with:
          name: lumiluna-android-arm32
          path: release/android

      - name: Download Android APK (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: lumiluna-android-x86_64
          path: release/android

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}+${{ github.run_id }}
          name: "LumiLuna v${{ steps.version.outputs.version }}"
          body: |
            ## LumiLuna v${{ steps.version.outputs.version }}

            Automated release from commit `${{ github.sha }}`.

            ### Downloads

            - **Windows**: `release/windows/` — x64 installer / portable bundle
            - **Android**: `release/android/` — arm64-v8a / armeabi-v7a / x86_64 APKs
          files: |
            release/**
          generate_release_notes: true
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
