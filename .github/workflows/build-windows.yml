name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Windows (desktop)
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      # The windows/ platform directory is committed to the repository,
      # so there is no need to run `flutter create --platforms=windows`.

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: lumiluna-windows
          path: build/windows/x64/runner/Release/*
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Android (mobile)
  # ---------------------------------------------------------------------------
  build-android:
    name: Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      # Android platform files were added via `flutter create --platforms=android`
      # and are committed to the repository.

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build Android APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Upload APK (arm64-v8a)
        uses: actions/upload-artifact@v5
        with:
          name: lumiluna-android-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload APK (armeabi-v7a)
        uses: actions/upload-artifact@v5
        with:
          name: lumiluna-android-arm32
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Upload APK (x86_64)
        uses: actions/upload-artifact@v5
        with:
          name: lumiluna-android-x86_64
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30
