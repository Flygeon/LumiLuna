name: lumiluna
description: LumiLuna — a Material Design media library app for Windows desktop, browsing and playing local images, videos and music.
publish_to: "none"
version: 1.0.2-beta.1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  flutter_animate: ^4.5.2
  heroine: ^0.7.2
  pdfx: ^2.9.2
  epub_pro: ^5.6.0
  archive: ^4.0.9
  image: ^4.8.0
  flutter_typeahead: ^6.0.0

  # Unified audio + video playback (native Windows support)
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # Local file system media scanning
  file_picker: ^8.1.2
  path_provider: ^2.1.4

  # Persistence
  shared_preferences: ^2.3.2

  # Date / duration formatting
  intl: ^0.20.2

  # Video thumbnail extraction (native Windows support)
  fc_native_video_thumbnail: ^1.0.0

  # Audio tag / metadata reading — pure Dart, no native build step, so it
  # compiles cleanly on CI (Windows/Linux/macOS) and stays cross-platform.
  audio_metadata_reader: ^1.6.0

  # Apple Music-style lyrics viewer with built-in translation support,
  # word-by-word highlight, and external position-driven scrolling (push-based
  # via LyricController.setProgress).  No audio player dependency — works
  # alongside media_kit without native conflicts.
  flutter_lyric: ^3.0.7

  # App version / build info for the About screen
  package_info_plus: ^8.0.0
  path: ^1.9.1
  watcher: ^1.2.1
  sqlite3_flutter_libs: ^0.6.0+eol
  drift: ^2.34.2
  permission_handler: ^12.0.3
  desktop_drop: ^0.5.0
  sliding_up_panel: ^2.0.0+1
  audio_waveforms: ^2.0.2
  audio_video_progress_bar: ^2.0.3
  flutter_rust_bridge: 2.12.0
  lumiluna_rust:
    path: rust_builder

dev_dependencies:
  build_runner: ^2.15.1
  drift_dev: ^2.34.4
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  # Enable flutter_gen (localization via gen-l10n + lib/l10n/*.arb).
  generate: true
  assets:
    - assets/fonts/
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/SourceHanSansSC-Regular-2.otf
